<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Erdem Yıldırım — erdm.io</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* hero name reveal animations — variant-driven */
  .hero-name .row { line-height: 0.86; display: block; overflow: hidden; }
  .hero-name .letter { display: inline-block; opacity: 0; }
  /* mask: rise from below */
  .hero-name .letter.v-mask {
    transform: translateY(110%) rotate(-4deg);
    animation: maskUp .9s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes maskUp { to { transform: translateY(0) rotate(0); opacity: 1; } }
  /* blur: focus pull */
  .hero-name .letter.v-blur {
    filter: blur(14px); transform: translateY(20px);
    animation: blurIn 1.1s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes blurIn { to { filter: blur(0); opacity: 1; transform: translateY(0); } }
  /* split: stagger-rotate */
  .hero-name .letter.v-split {
    transform: translateY(80%) scaleY(.6);
    transform-origin: bottom;
    animation: splitIn .85s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes splitIn { to { transform: translateY(0) scaleY(1); opacity: 1; } }

  .hero-name .accent {
    color: var(--accent);
    font-style: italic;
    display: inline-block;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="content.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="visuals.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "en",
  "palette": "slate",
  "heroVariant": "blur",
  "smoothScroll": true
}/*EDITMODE-END*/;

const PALETTES = {
  blue: { paper: "#ebe4d6", paper2: "#f1ebe0", paper3: "#e2dac8", ink: "#2a2520", accent: "#5a7a9e", ochre: "#c89a5e" },
  sage: { paper: "#ece6d8", paper2: "#f1ecdf", paper3: "#dfd9c8", ink: "#28261f", accent: "#7a9078", ochre: "#c69468" },
  terracotta: { paper: "#f0e7d8", paper2: "#f4ecdd", paper3: "#e6dcc9", ink: "#2a2018", accent: "#b86a4e", ochre: "#d4a26b" },
  slate: { paper: "#e6e2d6", paper2: "#ece8dc", paper3: "#dcd6c6", ink: "#22211d", accent: "#6e7a8a", ochre: "#b8966a" },
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const lang = t.lang;
  const [active, setActive] = React.useState("intro");
  const setLang = (v) => setTweak("lang", v);

  // apply palette
  React.useEffect(() => {
    const p = PALETTES[t.palette] || PALETTES.blue;
    const r = document.documentElement.style;
    r.setProperty("--paper", p.paper);
    r.setProperty("--paper-2", p.paper2);
    r.setProperty("--paper-3", p.paper3);
    r.setProperty("--ink", p.ink);
    r.setProperty("--accent", p.accent);
    r.setProperty("--ochre", p.ochre);
  }, [t.palette]);

  // active section tracking
  React.useEffect(() => {
    const ids = ["intro", "about", "experience", "projects", "stack", "education", "playground", "writing", "contact"];
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.id); });
    }, { rootMargin: "-45% 0px -45% 0px" });
    ids.forEach((id) => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, [lang]);

  // smooth scroll (lightweight, no Lenis dep)
  React.useEffect(() => {
    if (!t.smoothScroll) { document.documentElement.style.scrollBehavior = "auto"; return; }
    document.documentElement.style.scrollBehavior = "smooth";
  }, [t.smoothScroll]);

  // terminal trigger: ~ key (no overlay; just smooth-scroll to playground)
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === "~" && !["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) {
        document.getElementById("playground")?.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const jump = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  const accent = (PALETTES[t.palette] || PALETTES.blue).accent;

  return (
    <>
      <Cursor />
      <TopBar lang={lang} setLang={setLang} />
      <Rail lang={lang} active={active} onJump={jump} />
      <main>
        <Hero lang={lang} accent={accent} heroVariant={t.heroVariant} />
        <About lang={lang} />
        <Experience lang={lang} />
        <Projects lang={lang} />
        <Stack lang={lang} />
        <Education lang={lang} />
        <Playground lang={lang} />
        <Writing lang={lang} />
        <Footer lang={lang} />
      </main>

      <TweaksPanel>
        <TweakSection label="Language" />
        <TweakRadio label="Locale" value={t.lang} options={["en", "tr"]} onChange={(v) => setTweak("lang", v)} />
        <TweakSection label="Palette" />
        <TweakRadio label="Accent" value={t.palette} options={["blue", "sage", "terracotta", "slate"]} onChange={(v) => setTweak("palette", v)} />
        <TweakSection label="Hero" />
        <TweakRadio label="Name reveal" value={t.heroVariant} options={["mask", "blur", "split"]} onChange={(v) => setTweak("heroVariant", v)} />
        <TweakSection label="Motion" />
        <TweakToggle label="Smooth scroll" value={t.smoothScroll} onChange={(v) => setTweak("smoothScroll", v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
